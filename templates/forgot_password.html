{% extends "base.html" %}

{% block title %}Forgot Password - Smart Complaint System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header bg-gradient-primary text-white text-center">
                <h3><i class="fas fa-key"></i> Forgot Password</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                        <div class="form-text">Enter your registered email to receive a reset code.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 send-code-btn">Send Reset Code</button>
                </form>
                <div class="text-center mt-3">
                    <p>Remember your password? <a href="{{ url_for('login') }}">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
