{% extends "base.html" %}

{% block title %}Reset Password - Smart Complaint System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header bg-gradient-primary text-white text-center">
                <h3><i class="fas fa-lock"></i> Reset Password</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('reset_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label">Reset Code</label>
                        <input type="text" class="form-control" id="code" name="code" required maxlength="6">
                        <div class="form-text">Enter the 6-digit code sent to your email.</div>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 reset-btn">Reset Password</button>
                </form>
                <div class="text-center mt-3">
                    <p>Didn't receive code? <a href="{{ url_for('forgot_password') }}">Send again</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
